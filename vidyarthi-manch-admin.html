<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Admin — विद्यार्थी मंच</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Mukta:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root{--k:#E8650A;--kd:#C2540A;--r:#9B1C1C;--rd:#7F1D1D;--rp:#5C0A0A;--g:#F59E0B;--cr:#FFF8F0;--ok:#1E8E3E}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Mukta',sans-serif;background:var(--cr);color:#1A0A00}
.topbar{background:linear-gradient(135deg,var(--rp),var(--r));color:#fff;padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem}
.topbar h1{font-family:'Baloo 2',sans-serif;font-size:1.1rem}
.wrap{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}

#loginBox{max-width:360px;margin:4rem auto;background:#fff;padding:2rem;border-radius:14px;box-shadow:0 6px 24px rgba(0,0,0,.12);text-align:center}
#loginBox input{width:100%;padding:.7rem;border:1.5px solid #E8CBB0;border-radius:8px;margin:.6rem 0;font-family:inherit}
#loginBox button{width:100%;background:var(--k);color:#fff;border:none;padding:.7rem;border-radius:8px;font-weight:700;cursor:pointer;margin-top:.5rem}
#loginErr{color:var(--r);font-size:.82rem;margin-top:.5rem;display:none}

#app{display:none}
.filters{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap}
.filters button{padding:.5rem 1rem;border:2px solid var(--k);background:#fff;color:var(--r);border-radius:8px;font-weight:700;cursor:pointer;font-family:inherit;font-size:.85rem}
.filters button.active{background:var(--k);color:#fff}

.row{background:#fff;border-radius:12px;padding:1rem;margin-bottom:.9rem;box-shadow:0 3px 12px rgba(0,0,0,.06);border-left:4px solid var(--k)}
.row h3{font-family:'Baloo 2',sans-serif;font-size:.95rem;color:var(--rd)}
.meta{font-size:.78rem;color:#8a6a50;margin:.3rem 0}
.detail{display:none;margin-top:.7rem;padding-top:.7rem;border-top:1px dashed #eee;font-size:.83rem;line-height:1.7}
.detail.open{display:block}
.detail b{color:var(--rd)}
.actions{display:flex;gap:.5rem;margin-top:.7rem;flex-wrap:wrap}
.actions button{padding:.4rem .8rem;border:none;border-radius:6px;font-weight:700;font-size:.78rem;cursor:pointer;font-family:inherit}
.a-approve{background:#DCFCE7;color:#166534}
.a-reject{background:#FEE2E2;color:#991B1B}
.a-feature{background:#FEF3C7;color:#92400E}
.a-delete{background:#333;color:#fff}
.a-view{background:#EFF6FF;color:#1E40AF}
.imgs img{width:60px;height:60px;object-fit:cover;border-radius:6px;margin:.3rem .3rem 0 0}
.empty{text-align:center;padding:3rem;color:#8a6a50}
</style>
</head>
<body>

<div id="loginBox">
  <i class="fas fa-shield-halved" style="font-size:2rem;color:var(--r)"></i>
  <h2 style="margin:.7rem 0;font-family:'Baloo 2',sans-serif">Admin Login</h2>
  <input type="email" id="adminEmail" placeholder="Admin Email">
  <input type="password" id="adminPw" placeholder="Admin Password">
  <button onclick="login()">प्रवेश करा</button>
  <div id="loginErr">चुकीचा ईमेल/पासवर्ड</div>
</div>

<div id="app">
  <div class="topbar">
    <h1>🎓 विद्यार्थी मंच — Admin</h1>
    <button onclick="logout()" style="background:none;border:1px solid #fff;color:#fff;padding:.4rem .9rem;border-radius:6px;cursor:pointer">Logout</button>
  </div>
  <div class="wrap">
    <div class="filters">
      <button class="active" onclick="setStatus('pending')">Pending</button>
      <button onclick="setStatus('approved')">Approved</button>
      <button onclick="setStatus('rejected')">Rejected</button>
    </div>
    <div id="list"><div class="empty"><i class="fas fa-spinner fa-spin"></i> लोड होत आहे...</div></div>
  </div>
</div>

<script>
/* ⚠️ इथे तोच Firebase Config टाका जो vidyarthi-manch.html मध्ये आहे */
const firebaseConfig = {
  apiKey: "AIzaSyDD5o-yg5LDfvNuG8eyNh-WdH-GCSCRmYY",
  authDomain: "vidyarthi---manch.firebaseapp.com",
  projectId: "vidyarthi---manch",
  storageBucket: "vidyarthi---manch.firebasestorage.app",
  messagingSenderId: "455378425843",
  appId: "1:455378425843:web:1e2b594c03d966d7e92486"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
let currentStatus = 'pending';
let items = [];

auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById('loginBox').style.display='none';
    document.getElementById('app').style.display='block';
    loadList();
  }
});

async function login(){
  const email = document.getElementById('adminEmail').value;
  const pw = document.getElementById('adminPw').value;
  try{
    await auth.signInWithEmailAndPassword(email, pw);
  }catch(err){
    document.getElementById('loginErr').style.display = 'block';
  }
}
function logout(){ auth.signOut(); location.reload(); }
function setStatus(s){
  currentStatus = s;
  [...document.querySelectorAll('.filters button')].forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  loadList();
}

async function loadList(){
  const el = document.getElementById('list');
  el.innerHTML = '<div class="empty"><i class="fas fa-spinner fa-spin"></i> लोड होत आहे...</div>';
  try{
    const snap = await db.collection('submissions').where('status','==',currentStatus).get();
    items = snap.docs.map(d=>({id:d.id, ...d.data()}));
    render();
  }catch(e){
    el.innerHTML = '<div class="empty">लोड करता आले नाही — Security Rules तपासा. (' + e.message + ')</div>';
  }
}
function render(){
  const el = document.getElementById('list');
  if(!items.length){ el.innerHTML = '<div class="empty">या श्रेणीत काहीही नाही.</div>'; return; }
  el.innerHTML = items.map((i,idx)=>`
    <div class="row">
      <h3>${esc(i.institutionName)} <span style="font-weight:400;font-size:.78rem;color:#8a6a50">(${i.status})</span></h3>
      <div class="meta">${esc(i.institutionType)} • ${esc(i.district)} ${i.taluka?', '+esc(i.taluka):''} • ${i.timestamp&&i.timestamp.toDate?i.timestamp.toDate().toLocaleString('mr-IN'):''}</div>
      <div class="actions">
        <button class="a-view" onclick="toggleDetail(${idx})"><i class="fas fa-eye"></i> तपशील</button>
        ${i.status!=='approved'?`<button class="a-approve" onclick="update('${i.id}',{status:'approved'})"><i class="fas fa-check"></i> Approve</button>`:''}
        ${i.status!=='rejected'?`<button class="a-reject" onclick="update('${i.id}',{status:'rejected'})"><i class="fas fa-xmark"></i> Reject</button>`:''}
        <button class="a-feature" onclick="update('${i.id}',{featured:${!i.featured}})"><i class="fas fa-star"></i> ${i.featured?'Unfeature':'Feature'}</button>
        <button class="a-delete" onclick="del('${i.id}')"><i class="fas fa-trash"></i> Delete</button>
      </div>
      <div class="detail" id="detail-${idx}">
        <b>पूर्ण नाव:</b> ${esc(i.fullName)}<br>
        <b>मोबाईल:</b> ${esc(i.mobile)} | <b>ईमेल:</b> ${esc(i.email)}<br>
        <b>Student ID:</b> ${esc(i.studentId)} | <b>Course:</b> ${esc(i.course)} | <b>Year:</b> ${esc(i.year)} | <b>Dept:</b> ${esc(i.department)}<br>
        <b>पत्ता:</b> ${esc(i.address)}<br>
        <b>Ratings:</b> ${Object.entries(i.ratings||{}).map(([k,v])=>`${k}: ${v}★`).join(', ')}<br>
        <b>उपलब्ध:</b> ${(i.facilitiesAvailable||[]).join(', ')||'—'}<br>
        <b>अनुपलब्ध:</b> ${(i.facilitiesMissing||[]).join(', ')||'—'}<br>
        <b>परीक्षण:</b> ${esc(i.review)}<br>
        <b>Privacy:</b> Name:${i.privacyShowName} Course:${i.privacyShowCourse} Year:${i.privacyShowYear} Dept:${i.privacyShowDept}<br>
        <b>Google Verified:</b> ${i.googleVerified?'✅':'—'}<br>
        <b>Device:</b> ${esc(i.deviceInfo)}<br>
        <b>Browser:</b> ${esc(i.userAgent)}<br>
        <div class="imgs">${(i.uploads||[]).map(u=>u.type&&u.type.indexOf('image')===0?`<img src="${u.url}">`:`<a href="${u.url}" target="_blank" style="font-size:.78rem">${esc(u.name)}</a>`).join('')}</div>
      </div>
    </div>
  `).join('');
}
function toggleDetail(idx){ document.getElementById('detail-'+idx).classList.toggle('open'); }
async function update(id, patch){
  await db.collection('submissions').doc(id).update(patch);
  loadList();
}
async function del(id){
  if(!confirm('ही नोंद कायमची डिलीट करायची आहे का?')) return;
  await db.collection('submissions').doc(id).delete();
  loadList();
}
function esc(s){ return (s||'').toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
</script>
</body>
</html>
